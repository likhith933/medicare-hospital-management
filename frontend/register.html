<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration — MediCare</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">MediCare</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="#" class="active">Patient Register</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="auth-wrapper">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <h2>Create Patient Account</h2>
                <p style="color:var(--text-secondary);">Access AI diagnostics & online bookings</p>
            </div>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" class="form-control" placeholder="John Doe" required autocomplete="name">
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label for="reg-age">Age</label>
                        <input type="number" id="reg-age" class="form-control" placeholder="30" min="0" max="120" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-blood">Blood Group</label>
                        <select id="reg-blood" class="form-control">
                            <option value="">Select</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="reg-phone">Phone Number</label>
                    <input type="tel" id="reg-phone" class="form-control" placeholder="+1 (555) 000-0000" required autocomplete="tel">
                </div>
                
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="john@example.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required autocomplete="new-password">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">Create Account</button>
            </form>
            
            <div class="auth-footer">
                Already registered? <a href="index.html">Sign In Here</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const age = document.getElementById('reg-age').value;
            const blood = document.getElementById('reg-blood').value;
            const phone = document.getElementById('reg-phone').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            
            await Auth.register(name, age, email, password, phone, blood);
        });
    </script>
</body>
</html>
