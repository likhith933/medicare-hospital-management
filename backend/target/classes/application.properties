# Server Configuration
server.port=8080

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/medicare_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Root@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# 256-bit HMAC-SHA Secret Key (Hex encoded)
medicare.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Expiration: 24 Hours in milliseconds (86400000)
medicare.jwt.expiration-ms=86400000
# Refresh Token Expiration: 7 Days in milliseconds (604800000)
medicare.jwt.refresh-expiration-ms=604800000

# Machine Learning Service Integration
ml.service.url=http://localhost:5000

# Logging Levels
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.com.medicare=DEBUG
